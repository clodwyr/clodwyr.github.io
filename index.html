<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Space Invaders</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100vw;
      height: 100vh;
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>
  <canvas id="canvas">
    <!-- Static fallback for browsers without Canvas/WebAssembly support -->
    <img src="assets/crab_white.png" alt="Space Invaders" width="800" />
  </canvas>
  <link data-trunk rel="rust" data-wasm-opt="z" data-target-name="space_invaders" />
  <link data-trunk rel="copy-dir" href="assets" />
</body>
</html>
